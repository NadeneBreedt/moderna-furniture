<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curv Email Signature Preview</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f1f3ef;
      font-family: Arial, Helvetica, sans-serif;
      color: #17201d;
    }

    main {
      width: min(92vw, 920px);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(23, 32, 29, 0.12);
      background: white;
    }

    p {
      margin: 18px 0 0;
      color: #65706b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <img src="curv-email-signature.svg" alt="Curv Office email signature">
    <p>Preview of the SVG email signature concept.</p>
  </main>
</body>
</html>
